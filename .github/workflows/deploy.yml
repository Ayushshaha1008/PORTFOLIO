name: Deploy Portfolio

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - run: npm install

      # 4️⃣ Build production (dist/)
      - run: npm run build

      # 5️⃣ Deploy to GitHub Pages using the new official deploy action
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v5
        with:
          branch: gh-pages  # GitHub Pages branch
          folder: dist      # Build output folder
          clean: true       # Remove old files before deploy
          token: ${{ secrets.GITHUB_TOKEN }}
